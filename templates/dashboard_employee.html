{% extends "base.html" %}
{% block content %}
<div class="container-fluid py-5">
    <div class="row">
        <div class="col-md-8">
            <h2 class="fw-bold mb-4">Welcome back!</h2>
            <div class="card border-0 shadow-sm p-5 mb-4 bg-light">
                <h4>Predict Your Productivity</h4>
                <p class="text-muted">Use our AI model to analyze your current workload and burnout risk.</p>
                <a href="/predict" class="btn btn-primary btn-lg mt-3">Start New Assessment</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-4 text-center">
                <h6 class="text-muted text-uppercase">Organization Health</h6>
                <h2 class="text-success">{{ team_avg }}%</h2>
                <p class="small">Current Avg Productivity Score across your department.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
